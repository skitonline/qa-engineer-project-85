---
- summary: |
    Запуск игры незарегистрированного пользователя
  requirement: |
    Пользователь может протестировать механику сражения, не заходя в аккаунт
  prerequisites: |
    Открыта главная страница, вход в аккаунт не выполнен
  test-data: |
    Отсутствуют
  steps:
    - Нажать на кнопку "Try simple battle"
  expected-result: |
    Пользователь пападает на страницу битвы

- summary: |
    Успешная регистрация пользователя через email
  requirement: |
    Пользователь может зарегистрироваться используя логин и пароль
  prerequisites:
    Открыта главная страница, вход в аккаунт не выполнен
  test-data: |
    Nickname: валидный, незанятый 
    Email: валидный
    Password: валидный
    Password Confirmation: совпадает с полем password
  steps:
    - Нажать кнпоку "Sign up"
    - Заполнить соответствующие поля тестовыми данными
    - Нажимать кнопку "Submit"
  expected-result: |
    В системе создается аккаунт с указанными данными и мы авторизованы под ним в системе

- summary: |
    Блокировка регистрация пользователя с занятым никнеймом
  requirement: |
    Пользователь может зарегистрироваться используя логин и пароль
  prerequisites:
    Открыта главная страница, вход в аккаунт не выполнен
  test-data: |
    Nickname: вводим уже занятый никнейм 
    Email: валидный
    Password: валидный
    Password Confirmation: совпадает с полем password
  steps:
    - Нажать кнпоку "Sign up"
    - Заполнить соответствующие поля тестовыми данными
    - Нажимать кнопку "Submit"
  expected-result: |
    Отказ в регистрации, сообщение о занятом никнейме 

- summary: |
    Успешная регистриация через аккаунт на гитхабе
  requirement: |
    Пользователь может зарегистрироваться через свой аккаунт на github'e
  prerequisites:
    Открыта главная страница, вход в аккаунт не выполнен, имеется несвязанный с codebattle аккаунт на гитхабе
  test-data: |
    Отсутствуют
  steps:
    - Нажать кнпоку "Sign up"
    - Нажать кнпоку "Sign up with Github"
    - Нажать кнопку "Authorize vtm9" на сайте гитхаба 
  expected-result: |
    В системе создается аккаунт связанный с гитхабом и мы авторизованы через него в системе

- summary: |
    Успешная авторизация через логин и пароль 
  requirement: |
    Пользователь может авторизоваться через свои логин и пароль
  prerequisites:
    Открыта главная страница, вход в аккаунт не выполнен, есть зарегистрированный аккаунт и мы знаем его логин и пароль 
  test-data: |
    Email: зарегистрированный email
    Password: пароль связанный с этим email
  steps:
    - Нажать кнпоку "Sign in"
    - Заполняем поля email и password
    - Нажимать кнопку "Submit"
  expected-result: |
    Выполнен вход в систему

- summary: |
    Успешная авторизация аккаунт через гитхаб
  requirement: |
    Пользователь может авторизоваться через свой аккаунт на github'e
  prerequisites:
    Открыта главная страница, вход в аккаунт не выполнен, есть зарегистрированный аккаунт свзанный с гитхабом
  test-data: |
    Отсутствуют
  steps:
    - Нажать кнпоку "Sign in"
    - Нажать кнпоку "Sign in with Github"
  expected-result: |
    Выполнен вход в систему

- summary: |
    Успешное восстановление пароля
  requirement: |
    Пользователь может восстановить свой пароль
  prerequisites:
    Открыта главная страница, вход в аккаунт не выполнен, есть зарегистрированный аккаунт
  test-data: |
    email: email от зарегистрированного аккаунта
  steps:
    - Нажать кнпоку "Sign in"
    - Нажать "Forgot your password?"
    - Ввести email
    - Нажимать кнопку "Submit"
    - На указанной почте найти инструкцию по восстановлению пароля (возможно в папке спам)
    - Следуя инструкциям из письма поменять паролль
  expected-result: |
    У аккаунта с указанной почтой поменялся пароль 

- summary: |
    Неуспешное восстановление пароля
  requirement: |
    Пользователь может восстановить свой пароль
  prerequisites:
    Открыта главная страница, вход в аккаунт не выполнен, есть зарегистрированный аккаунт
  test-data: |
    email: email непривязанный ни к какому аккаунту
  steps:
    - Нажать кнпоку "Sign in"
    - Нажать "Forgot your password?"
    - Ввести email
    - Нажать кнопку "Submit"
  expected-result: |
    Система сообщает о том, что email не найден 

- summary: |
    Успешный выход из аккаунта 
  requirement: |
    Пользователь может выйти из своего аккаунта 
  prerequisites:
    Открыта главная страница, выполнен вход в аккаунт
  test-data: |
    Отсутствуют 
  steps:
    - Нажать на профиль пользователя в правом верхнем углу экрана
    - Нажать в выпадающем меню на "Sign out"
  expected-result: |
    Пользователь выходит из своего профиля 
